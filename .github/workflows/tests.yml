# Runs the unit test suite. No API key is needed and no scan is ever run:
# the tests only validate configs and render report HTML from fake leads.
name: tests

on:
  push:
    branches: [main, feat/sde-targeting]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
