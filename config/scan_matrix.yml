# Targeted Santo Domingo Este scan matrix.
#
# Instead of scanning every category in every neighborhood (12 areas x 6
# categories = 72 requests), each area only gets the categories that fit its
# commercial profile. Run the whole matrix with:
#
#     py scripts/scan_places.py --matrix
#     py scripts/scan_places.py --matrix --dry-run      (preview, no API calls)
#     py scripts/scan_places.py --matrix --max-requests 40
#
# One Nearby Search (New) request is made per (area x category) pair:
# 36 requests total. Results merge into data/scan_results.json by place id,
# exactly like every other scan mode.
#
# Approved pilot (run these BEFORE the full matrix):
#     py scripts/scan_places.py --area sde-ensanche-ozama --category salons
#     py scripts/scan_places.py --area sde-charles-de-gaulle --category auto_services
#
# Secondary categories (approved for later, NOT in the matrix yet):
# laundries (type: laundry, verified in Table A 2026-07-10). Fitness was
# promoted into the service-category expansion below on 2026-07-11.
#
# Area labels must exist in scan_areas.yml; category labels in categories.yml.

matrix:
  # Ensanche Ozama & Alma Rosa: beauty, food, events
  - area: sde-ensanche-ozama
    categories: [salons, restaurants, event_services]
  - area: sde-alma-rosa
    categories: [salons, restaurants, event_services]

  # Los Mina & San Vicente corridor: beauty, phone repair, food
  - area: sde-los-mina
    categories: [salons, phone_repair, restaurants]
  - area: sde-san-vicente
    categories: [salons, phone_repair, restaurants]

  # Villa Faro, Hainamosa, Charles de Gaulle: auto, home services, phone repair
  - area: sde-villa-faro
    categories: [auto_services, home_services, phone_repair]
  - area: sde-hainamosa
    categories: [auto_services, home_services, phone_repair]
  - area: sde-charles-de-gaulle
    categories: [auto_services, home_services, phone_repair]

  # Invivienda & Cancino: home services, auto, beauty
  - area: sde-invivienda
    categories: [home_services, auto_services, salons]
  - area: sde-cancino
    categories: [home_services, auto_services, salons]

  # San Isidro / Prados de San Luis (one circle covers both): auto, home, food
  - area: sde-san-isidro
    categories: [auto_services, home_services, restaurants]

  # La Isabelita & Av. Espana: food, events, auto
  - area: sde-isabelita
    categories: [restaurants, event_services, auto_services]
  - area: sde-avenida-espana
    categories: [restaurants, event_services, auto_services]

  # ---- Service-category expansion (2026-07-11): 25 additional targeted
  # ---- requests. Reservation/appointment/membership/quote businesses only.
  #
  # Overlap review: the western circles (ensanche-ozama, alma-rosa, los-mina,
  # san-vicente) partially overlap on purpose — each request returns only the
  # ~20 most prominent matches, so re-sampling surfaces different businesses;
  # duplicates merge by place id. Nightlife deliberately targets the Av.
  # Espana corridor (the SDE waterfront strip) instead of Isabelita; Los Mina
  # and San Vicente can be added later IF the first round shows real
  # nightlife density there. Transport splits the 4 planned areas by offer:
  # rentals/transfers on the airport corridor (san-isidro, charles-de-gaulle),
  # movers/couriers/storage on the residential + artery circles.

  # Nightlife: dense bar zones + the coastal entertainment strip.
  - area: sde-ensanche-ozama
    categories: [nightlife, fitness, pet_services]
  - area: sde-alma-rosa
    categories: [nightlife, event_venues, fitness, pet_services]
  - area: sde-avenida-espana
    categories: [nightlife]

  # Event venues: party/wedding spaces in residential expansion zones.
  - area: sde-isabelita
    categories: [event_venues, pet_services]
  - area: sde-invivienda
    categories: [event_venues, fitness, moving_storage]
  - area: sde-san-isidro
    categories: [event_venues, fitness, pet_services, transport_rental]
  - area: sde-hainamosa
    categories: [event_venues, fitness, pet_services, moving_storage]

  # Fitness in the remaining dense corridors.
  - area: sde-los-mina
    categories: [fitness]
  - area: sde-san-vicente
    categories: [fitness]

  # Transport & moving on the airport corridor and main arteries.
  - area: sde-charles-de-gaulle
    categories: [transport_rental, moving_storage]
